<section class="flex justify-center items-center h-screen">
  <div class="m-28 w-96">
    <div class="icon flex p-1 w-fit border border-gray-300 cursor-pointer">
      <lucide-icon [name]="moveLeft"></lucide-icon>
    </div>
    <div class="content mt-10">
      <h1 class="font-bold text-2xl">Password Reset Sent</h1>

      <div class="description mt-2">
        <p>
          We have sent a password reset link to:
          <span class="cursor-pointer text-blue-600">user@example.com.</span>
        </p>

        <p class="mt-4">
          Please check your inbox and follow the instructions to reset your password.
        </p>

        <p class="text-gray-600 mt-4">
          If you don’t see the email within a few minutes, check your spam or junk folder.
        </p>
        <p class="text-gray-600 text-sm mt-10">
          Don’t have an account?
          <span class="text-blue-600 cursor-pointer ml-1"> Create yours</span>
        </p>
      </div>
    </div>
  </div>
</section>
