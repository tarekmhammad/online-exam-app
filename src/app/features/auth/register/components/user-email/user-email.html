<section class="flex h-screen justify-center items-center">
  <form [formGroup]="emailForm" (ngSubmit)="emailHandler()">
    <h1 class="font-bold text-3xl">Create Account</h1>
    <div class="mt-5">
      <label for="email">Email</label>
      <input
        formControlName="email"
        id="email"
        type="email"
        placeholder="user@example.com"
        class="placeholder:text-gray-400 p-2.5 border border-gray-200 outline-0 w-full"
      />
    </div>
    <button
      class="flex justify-center items-center w-full bg-blue-100 text-black py-2 mt-8 cursor-pointer border border-blue-600"
    >
      Next
      <span class="ml-3"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-chevron-right-icon lucide-chevron-right"
        >
          <path d="m9 18 6-6-6-6" /></svg
      ></span>
    </button>
    <p class="text-gray-600 text-sm flex justify-center mt-10">
      Already have an account?
      <span class="text-blue-600 cursor-pointer ml-1" routerLink="/login"> Login</span>
    </p>
  </form>
</section>
