<section class="flex justify-center items-center h-screen">
  <form action="">
    <h1 class="font-bold text-lg">Forgot Password</h1>
    <p class="text-gray-600 text-sm mt-2">Don’t worry, we will help you recover your account.</p>
    <div class="mt-4">
      <label for="email">Email</label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Woooow@gmail.com"
        class="w-full p-2.5 border border-gray-400"
      />
    </div>

    <button
      class="flex justify-center items-center w-full bg-blue-600 text-white py-2 mt-8 cursor-pointer"
    >
      Continue
      <lucide-icon [name]="moveRight" class="ml-2" [size]="18"></lucide-icon>
    </button>
    <p class="text-gray-600 text-sm flex justify-center mt-8">
      Don’t have an account?
      <span class="text-blue-600 cursor-pointer ml-1" routerLink="/register"> Create yours</span>
    </p>
  </form>
</section>
